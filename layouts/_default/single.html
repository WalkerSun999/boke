<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ .Title }} - {{ .Site.Title }}</title>
  <style>
    body { max-width: 720px; margin: 2rem auto; padding: 0 1rem; font-family: -apple-system, BlinkMacSystemFont, sans-serif; line-height: 1.7; color: #333; }
    h1 { font-size: 1.8rem; border-bottom: 2px solid #eee; padding-bottom: 0.5rem; }
    .meta { color: #888; font-size: 0.9rem; margin-bottom: 1.5rem; }
    .tags { display: flex; gap: 0.5rem; margin: 1rem 0; }
    .tag { background: #f0f0f0; padding: 0.2rem 0.6rem; border-radius: 4px; font-size: 0.85rem; }
    a { color: #0366d6; text-decoration: none; }
    a:hover { text-decoration: underline; }
    pre { background: #f5f5f5; padding: 1rem; overflow-x: auto; border-radius: 4px; }
    code { font-family: SFMono-Regular, Consolas, monospace; font-size: 0.9em; }
    blockquote { border-left: 3px solid #ddd; margin: 0; padding-left: 1rem; color: #666; }
  </style>
</head>
<body>
  <header><a href="{{ .Site.BaseURL }}">← 首页</a></header>
  <article>
    <h1>{{ .Title }}</h1>
    <div class="meta">
      {{ .Date.Format "2006-01-02" }} · {{ .Params.author }}
    </div>
    {{ if .Params.tags }}
    <div class="tags">
      {{ range .Params.tags }}<span class="tag">{{ . }}</span>{{ end }}
    </div>
    {{ end }}
    <div class="content">{{ .Content }}</div>
  </article>
</body>
</html>
